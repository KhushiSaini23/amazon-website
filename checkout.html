<!DOCTYPE html>
<html lang="en">
<head>
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RTDKKG5TC"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('config', 'G-4RTDKKG5TC');
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/shop-flow.css">
</head>
<body>
    <header style="background-color: black;" class="text-white py-2">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="clone.html"><img src="assets/images/Amazon.jpg" width="100" alt="Amazon"></a>
            <a class="header-cart-link" href="cart.html">Cart <span class="header-cart-count" data-cart-count>0</span></a>
        </div>
    </header>

    <main class="container shop-shell">
        <div class="shop-layout">
            <section class="shop-panel">
                <h1 class="page-title">Checkout</h1>
                <p class="page-subtitle">Enter delivery address and place your order with Cash on Delivery.</p>

                <form id="checkoutForm" class="checkout-form">
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="fullName">Full name</label>
                            <input id="fullName" name="fullName" type="text" required>
                        </div>
                        <div class="form-field">
                            <label for="phone">Phone number</label>
                            <input id="phone" name="phone" type="tel" required>
                        </div>
                        <div class="form-field full-width">
                            <label for="addressLine">Address</label>
                            <textarea id="addressLine" name="addressLine" required></textarea>
                        </div>
                        <div class="form-field">
                            <label for="city">City</label>
                            <input id="city" name="city" type="text" required>
                        </div>
                        <div class="form-field">
                            <label for="state">State</label>
                            <input id="state" name="state" type="text" required>
                        </div>
                        <div class="form-field">
                            <label for="pincode">Pincode</label>
                            <input id="pincode" name="pincode" type="text" required>
                        </div>
                    </div>

                    <div class="payment-section">
                        <h3>Payment method</h3>
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" checked>
                            <span>Cash on Delivery</span>
                        </label>
                    </div>

                    <button class="primary-button" type="submit">Place your order</button>
                </form>
            </section>

            <aside class="summary-panel">
                <h2>Order Summary</h2>
                <div id="checkoutItems"></div>
                <div class="summary-row"><span>Subtotal</span><strong id="checkoutSubtotal">Rs. 0</strong></div>
                <div class="summary-row"><span>Shipping</span><strong id="checkoutShipping">Rs. 0</strong></div>
                <div class="summary-row summary-total"><span>Total</span><strong id="checkoutTotal">Rs. 0</strong></div>
            </aside>
        </div>
    </main>

    <script src="js/cart.js"></script>
</body>
</html>
