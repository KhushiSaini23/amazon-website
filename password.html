<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Password</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RTDKKG5TC"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('config', 'G-4RTDKKG5TC');
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main class="auth-main">
        <a href="index.html" class="auth-logo" aria-label="Amazon home">
            <img src="assets/images/logo.jpeg" alt="Amazon">
        </a>

        <section class="auth-card">
            <h1>Sign in</h1>

            <p class="auth-email-line">
                <span id="savedEmail">your-email@example.com</span>
                <a href="index.html">Change</a>
            </p>

            <form id="passwordForm">
                <div class="auth-password-header">
                    <label class="auth-label" for="password">Password</label>
                    <a href="#">Forgot password?</a>
                </div>
                <input class="auth-input" id="password" name="password" type="password" autocomplete="current-password" required autofocus>
                <button class="auth-button" type="submit">Sign in</button>
                <p class="auth-error" id="passwordError">Enter your password.</p>
                <p class="auth-note">This is a demo flow for your project.</p>
            </form>
        </section>
    </main>

    <footer class="auth-footer">
        <div class="auth-footer-links">
            <a href="#">Conditions of Use</a>
            <a href="#">Privacy Notice</a>
            <a href="#">Help</a>
        </div>
        <div class="auth-footer-copy">
            &copy; 1996-2026, Amazon.com, Inc. or its affiliates
        </div>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
