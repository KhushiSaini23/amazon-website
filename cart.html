<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4RTDKKG5TC"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-4RTDKKG5TC');
</script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/shop-flow.css">
</head>
<body>
    <header style="background-color: black;" class="text-white py-2">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="clone.html"><img src="assets/images/Amazon.jpg" width="100" alt="Amazon"></a>
            <a class="header-cart-link" href="cart.html">Cart <span class="header-cart-count" data-cart-count>0</span></a>
        </div>
    </header>

    <main class="container shop-shell">
        <div class="shop-layout">
            <section class="shop-panel">
                <h1 class="page-title">Shopping Cart</h1>
                <p class="page-subtitle">Review your items, update quantity and continue to checkout.</p>
                <div id="cartItems"></div>
            </section>

            <aside class="summary-panel">
                <h2>Order Summary</h2>
                <div class="summary-row"><span>Subtotal</span><strong id="cartSubtotal">Rs. 0</strong></div>
                <div class="summary-row"><span>Shipping</span><strong id="cartShipping">Rs. 0</strong></div>
                <div class="summary-row summary-total"><span>Total</span><strong id="cartTotal">Rs. 0</strong></div>
                <a id="goCheckout" class="primary-button" href="checkout.html">Proceed to checkout</a>
                <a class="secondary-button" href="clone.html">Continue shopping</a>
            </aside>
        </div>
    </main>

    <script src="js/cart.js"></script>
</body>
</html>
